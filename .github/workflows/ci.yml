name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sst
          POSTGRES_PASSWORD: sst
          POSTGRES_DB: sst
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sst -d sst"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sst:sst@localhost:5432/sst?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-min-32-characters!!
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters!
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      SEED_ADMIN_EMAIL: admin@sst.local
      SEED_ADMIN_PASSWORD: ChangeMeNow!

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @sst/shared-types build
      - run: pnpm --filter @sst/shared-utils build
      - run: pnpm --filter @sst/api prisma:generate
      - run: pnpm --filter @sst/api exec prisma migrate deploy
      - run: pnpm --filter @sst/api build
      - run: pnpm --filter @sst/web build

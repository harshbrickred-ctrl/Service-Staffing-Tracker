services:
  postgres:
    image: postgres:16-alpine
    container_name: sst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sst
      POSTGRES_PASSWORD: sst
      POSTGRES_DB: sst
    ports:
      - "5433:5432"
    volumes:
      - sst_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sst -d sst"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sst_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sst-prometheus
    profiles: ["observability"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - sst_net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sst-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    networks:
      - sst_net

volumes:
  sst_pg_data:

networks:
  sst_net:
    name: sst_net
